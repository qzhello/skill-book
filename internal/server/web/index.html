<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SkillBook</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/dialog/dialog.css" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </span>
    <span class="brand-name">Skill<span class="brand-accent">Book</span></span>
  </div>
  <div class="topbar-right">
    <span id="count" class="count-pill" hidden></span>
    <button id="newSkill" class="btn btn-ghost btn-sm" title="新建 skill">
      <svg class="ico" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="btn-label">新建</span>
    </button>
    <button id="settings" class="icon-btn" title="设置 AI">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button id="scan" class="btn btn-primary btn-sm">
      <svg class="ico" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><path d="M21 3v6h-6"/></svg>
      <span class="btn-label">扫描</span>
    </button>
  </div>
</header>

<main class="stage" id="stage">
  <div class="search-hero">
    <div class="search-wrap" id="searchWrap">
      <svg class="search-ico" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" autocomplete="off" spellcheck="false" placeholder="搜索 skill —— 名称优先精确匹配…" />
      <button id="clear" class="icon-btn" hidden aria-label="清除搜索">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>

  <div id="chips" class="chips" hidden></div>

  <section id="overview" class="overview">
    <div class="empty-hero" id="emptyHero">
      <div class="empty-glow"></div>
      <h2>欢迎使用 SkillBook</h2>
      <p>点右上角「扫描」加载本机所有 skill，然后在上方搜索框查找。</p>
    </div>
  </section>

  <section id="resultsView" class="results-view" hidden>
    <div class="results-meta" id="resultsMeta"></div>
    <div id="viewport" class="viewport" tabindex="0">
      <div id="sizer" class="sizer"></div>
      <div id="window" class="window"></div>
    </div>
  </section>
</main>

<!-- 详情侧抽屉 -->
<div id="scrim" class="scrim" hidden></div>
<aside id="sheet" class="sheet" hidden aria-hidden="true">
  <div class="sheet-head">
    <div class="sheet-title">
      <h3 id="sheetName"></h3>
      <span id="sheetBadges" class="sheet-badges"></span>
    </div>
    <button id="sheetClose" class="icon-btn" aria-label="关闭">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div id="sheetPath" class="sheet-path"></div>
  <div class="sheet-toolbar">
    <div class="seg" id="modeSeg">
      <button class="seg-btn active" data-mode="view">浏览</button>
      <button class="seg-btn" data-mode="edit">编辑</button>
    </div>
    <div class="toolbar-spacer"></div>
    <button id="aiOptimize" class="btn btn-ai btn-sm" title="用 AI 优化这份 skill">
      <svg class="ico" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></svg>
      <span class="btn-label">AI 优化</span>
    </button>
    <button id="findBtn" class="icon-btn" title="查找 (⌘F)">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
    <button id="reveal" class="icon-btn" title="在 Finder 中打开">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
    </button>
    <button id="save" class="btn btn-primary btn-sm">
      <svg class="ico" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      <span class="btn-label">保存</span>
    </button>
    <span id="dirty" class="dirty-dot" hidden>●</span>
  </div>
  <div class="sheet-body">
    <div id="preview" class="md-preview"></div>
    <div id="editorWrap" class="sheet-editor" hidden><textarea id="ed"></textarea></div>
  </div>
</aside>

<!-- 通用模态 -->
<div id="modalScrim" class="scrim" hidden></div>

<!-- 设置 -->
<div id="settingsModal" class="modal" hidden role="dialog" aria-modal="true" aria-label="AI 设置">
  <div class="modal-head"><h3>AI 设置</h3><button class="icon-btn" data-close><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
  <div class="modal-body">
    <label class="field"><span>Provider</span>
      <select id="cfgProvider">
        <option value="openai">OpenAI 兼容（DeepSeek / OpenAI / Codex / Ollama）</option>
        <option value="anthropic">Anthropic（Claude）</option>
      </select></label>
    <label class="field"><span>Base URL <i>可留空用默认</i></span>
      <input id="cfgBaseURL" placeholder="https://api.deepseek.com" /></label>
    <label class="field"><span>Model</span>
      <input id="cfgModel" placeholder="deepseek-chat" /></label>
    <label class="field"><span>API Key <i id="keyHint"></i></span>
      <input id="cfgKey" type="password" placeholder="留空则不修改已存的 key" /></label>
    <div class="modal-note">key 仅保存在本机 <code>~/.skillbook/config.json</code>，不会上传、不回显。</div>
  </div>
  <div class="modal-foot">
    <button id="cfgTest" class="btn btn-ghost">测试连接</button>
    <span id="cfgStatus" class="cfg-status"></span>
    <div class="toolbar-spacer"></div>
    <button id="cfgSave" class="btn btn-primary">保存</button>
  </div>
</div>

<!-- 新建 -->
<div id="newModal" class="modal" hidden role="dialog" aria-modal="true" aria-label="新建 skill">
  <div class="modal-head"><h3>新建 skill</h3><button class="icon-btn" data-close><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
  <div class="modal-body">
    <label class="field"><span>名称 <i>小写字母、数字、连字符</i></span>
      <input id="newName" placeholder="my-skill" /></label>
    <label class="field"><span>创建配方</span>
      <select id="newRecipe"></select></label>
    <label class="field"><span>一句话描述（大白话）</span>
      <textarea id="newBrief" rows="3" placeholder="描述这个 skill 要做什么，AI 会据此生成初稿…"></textarea></label>
    <div class="modal-note" id="newAiHint"></div>
  </div>
  <div class="modal-foot">
    <span id="newStatus" class="cfg-status"></span>
    <div class="toolbar-spacer"></div>
    <button id="newCreate" class="btn btn-primary">创建</button>
  </div>
</div>

<!-- AI diff -->
<div id="diffModal" class="modal modal-wide" hidden role="dialog" aria-modal="true" aria-label="AI 优化对比">
  <div class="modal-head"><h3>AI 优化 · 并排对比</h3><button class="icon-btn" data-close><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
  <div class="diff-body">
    <div class="diff-pane"><div class="diff-label">原文</div><pre id="diffOld" class="diff-pre"></pre></div>
    <div class="diff-pane"><div class="diff-label">AI 优化稿</div><pre id="diffNew" class="diff-pre diff-new"></pre></div>
  </div>
  <div class="modal-foot">
    <div class="toolbar-spacer"></div>
    <button id="diffDiscard" class="btn btn-ghost">放弃</button>
    <button id="diffApply" class="btn btn-primary">应用到编辑器</button>
  </div>
</div>

<div id="toasts" class="toasts" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/dialog/dialog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/search/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
